name: Daily Job Research Agent

on:
  schedule:
    # Cada día a las 9:00 AM UTC = 11:00 AM España (verano) / 10:00 AM (invierno)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub → Actions

jobs:
  research:
    name: Investigar ofertas de trabajo
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run job research agent
        run: npm run jobs:research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
